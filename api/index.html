<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSense AI | Advanced Recommendation Engine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; min-height: 100vh; }
        .sidebar { background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); width: 280px; flex-shrink: 0; position: fixed; height: 100vh; z-index: 100; transition: transform 0.3s ease; }
        .main-content { margin-left: 280px; width: calc(100% - 280px); min-height: 100vh; background: radial-gradient(circle at 50% 0%, rgba(79, 70, 229, 0.05) 0%, transparent 70%); }
        .nav-link { transition: all 0.2s; cursor: pointer; border-radius: 12px; margin-bottom: 4px; padding: 12px 16px; font-weight: 500; font-size: 0.875rem; color: #94a3b8; display: flex; align-items: center; gap: 12px; }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-link.active { background: #4f46e5; color: #fff; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .app-header { height: 72px; border-bottom: 1px solid rgba(255,255,255,0.03); background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 50; }
        .card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: transform 0.3s, border-color 0.3s; }
        .card:hover { border-color: rgba(79, 70, 229, 0.4); }
        .badge { font-weight: 800; font-size: 0.65rem; padding: 2px 8px; border-radius: 6px; letter-spacing: 0.05em; }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; }
            .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DEMO_USERS = ['10001', '10002', '10003', '10004', '10005'];

        function Dashboard() {
            const [view, setView] = useState('recommendations');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [userId, setUserId] = useState('10001');
            const [recommendations, setRecommendations] = useState([]);
            const [allProducts, setAllProducts] = useState([]);
            const [categories, setCategories] = useState(['All']);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');
            const [selectedCat, setSelectedCat] = useState('All');
            const [userProfile, setUserProfile] = useState({ 
                name: 'Alex Thompson', 
                level: 'Platinum Elite', 
                avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=100',
                spent: '₹48,290',
                orders: 124
            });

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const ProductImage = ({ description, stockCode }) => {
                const desc = description?.toLowerCase() || '';
                let src = '';
                if (desc.includes('shoe') || desc.includes('sneaker') || desc.includes('footwear')) src = "/static/images/sneakers.png";
                else if (desc.includes('watch') || desc.includes('accessory') || desc.includes('jewelry')) src = "/static/images/watch.png";
                else if (desc.includes('gadget') || desc.includes('laptop') || desc.includes('phone') || desc.includes('camera') || desc.includes('tech')) src = "/static/images/gadgets.png";
                else if (desc.includes('earbud') || desc.includes('electronic') || desc.includes('sound') || desc.includes('headphone')) src = "/static/images/earbuds.png";
                else if (desc.includes('jean') || desc.includes('clothing') || desc.includes('shirt') || desc.includes('pant') || desc.includes('hoodie') || desc.includes('jacket')) src = "/static/images/jeans.png";
                
                if (!src) {
                    const tag = desc.split(' ').slice(-1)[0] || 'product';
                    src = `https://loremflickr.com/400/400/${tag}?lock=${stockCode || '1'}`;
                }
                return <img src={src} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={description} loading="lazy" />;
            };

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const [prodRes, catRes] = await Promise.all([
                            fetch('/api/products'),
                            fetch('/api/categories')
                        ]);
                        const prods = await prodRes.json();
                        const cats = await catRes.json();
                        setAllProducts(prods);
                        setCategories(cats.includes('All') ? cats : ['All', ...cats]);
                    } catch (err) { console.error(err); }
                };
                loadData();
            }, []);

            const generateRecommendations = async (id = userId) => {
                setLoading(true);
                try {
                    const res = await fetch(`/api/recommend/${id}?n=10`);
                    const data = await res.json();
                    if(data.recommendations) {
                        setRecommendations(data.recommendations.map(sc => {
                            const found = allProducts.find(p => String(p.StockCode) === String(sc));
                            return found || { StockCode: sc, Description: `Premium Discovery ${sc}`, Category: 'AI Choice', Price: 999 };
                        }));
                        setUserId(id);
                        
                        const names = ["Jordan Black", "Sarah Chen", "Marcus Vane", "Elara Moon", "David West"];
                        const tiers = ["Platinum Member", "Gold Member", "Diamond VIP", "Silver Tier", "Elite Plus"];
                        const avatars = [
                            "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=100",
                            "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=100",
                            "https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&q=80&w=100",
                            "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=100",
                            "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=100"
                        ];
                        const idx = parseInt(id) % 5;
                        setUserProfile({
                            name: names[idx],
                            level: tiers[idx],
                            avatar: avatars[idx],
                            spent: `₹${(15000 + (parseInt(id) % 5) * 6420).toLocaleString()}`,
                            orders: 12 + (parseInt(id) % 15)
                        });
                    } else if (data.error) alert(data.error);
                } catch (err) { alert("API Offline"); }
                setLoading(false);
            };

            const renderChart = () => {
                if (chartInstance.current) chartInstance.current.destroy();
                if (!chartRef.current) return;
                const ctx = chartRef.current.getContext('2d');
                const counts = {};
                allProducts.forEach(p => {
                    const cat = p.Category || 'Other';
                    counts[cat] = (counts[cat] || 0) + 1;
                });
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(counts).slice(0, 6),
                        datasets: [{
                            data: Object.values(counts).slice(0, 6),
                            backgroundColor: ['#4f46e5', '#9333ea', '#db2777', '#059669', '#d97706', '#2563eb'],
                            borderWidth: 0,
                            hoverOffset: 20
                        }]
                    },
                    options: { cutout: '80%', responsive: true, plugins: { legend: { display: false } } }
                });
            };

            useEffect(() => { if (view === 'analytics') setTimeout(renderChart, 100); }, [view, allProducts]);

            const filteredProducts = allProducts.filter(p => 
                (selectedCat === 'All' || p.Category === selectedCat) &&
                p.Description?.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="flex min-h-screen w-full relative">
                    {/* Sidebar Overlay for Mobile */}
                    {sidebarOpen && <div className="sidebar-overlay lg:hidden" onClick={() => setSidebarOpen(false)}></div>}

                    {/* Sidebar */}
                    <aside className={`sidebar flex flex-col p-6 ${sidebarOpen ? 'open' : ''}`}>
                        <div className="flex items-center justify-between mb-10 px-2 leading-none">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-lg bg-indigo-600 flex items-center justify-center text-xl shadow-lg shadow-indigo-500/20">🛍️</div>
                                <span className="text-xl font-extrabold tracking-tighter">ShopSense<span className="text-indigo-400 text-sm ml-1 font-mono">PRO</span></span>
                            </div>
                            <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-slate-500 text-2xl font-light">×</button>
                        </div>

                        <div className="space-y-1">
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-4 mb-4">Core Engine</p>
                            <div onClick={() => { setView('recommendations'); setSidebarOpen(false); }} className={`nav-link ${view === 'recommendations' ? 'active' : ''}`}>
                                <span className="text-lg">⚡</span> Intelligence
                            </div>
                            <div onClick={() => { setView('explorer'); setSidebarOpen(false); }} className={`nav-link ${view === 'explorer' ? 'active' : ''}`}>
                                <span className="text-lg">📂</span> Inventory
                            </div>
                            <div onClick={() => { setView('analytics'); setSidebarOpen(false); }} className={`nav-link ${view === 'analytics' ? 'active' : ''}`}>
                                <span className="text-lg">📊</span> Analytics
                            </div>
                            <div onClick={() => { setView('profile'); setSidebarOpen(false); }} className={`nav-link ${view === 'profile' ? 'active' : ''}`}>
                                <span className="text-lg">👤</span> User Profile
                            </div>
                        </div>

                        <div className="mt-auto p-4 bg-white/[0.02] border border-white/5 rounded-2xl">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                                <span className="text-[9px] font-bold text-slate-400 uppercase">Engine: Optimal</span>
                            </div>
                            <button className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-[10px] font-bold text-white transition-all shadow-lg shadow-indigo-600/20">Upgrade Plan</button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <div className="main-content flex flex-col">
                        <header className="app-header flex items-center justify-between px-6 lg:px-10">
                            <div className="flex items-center gap-4 flex-1 max-w-xl">
                                <button onClick={() => setSidebarOpen(true)} className="lg:hidden text-2xl p-2 -ml-2">☰</button>
                                <div className="relative flex-1 hidden sm:block">
                                    <input type="text" placeholder="Global search..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full bg-white/5 border border-white/5 rounded-xl py-2 px-10 text-sm outline-none focus:border-indigo-500/50 transition-all font-medium" />
                                    <span className="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-30 text-xs">🔍</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-4 lg:gap-6">
                                <div className="hidden md:flex gap-4 opacity-50 text-xl border-r border-white/5 pr-6">
                                    <span className="cursor-pointer hover:opacity-100 relative">
                                        🔔
                                        <div className="absolute top-0 right-0 w-2 h-2 bg-rose-500 rounded-full border-2 border-[#020617]"></div>
                                    </span>
                                </div>
                                <div onClick={() => setView('profile')} className="flex items-center gap-3 cursor-pointer group">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-xs font-bold text-white leading-tight group-hover:text-indigo-400">{userProfile.name}</p>
                                        <p className="text-[9px] font-bold text-indigo-500 uppercase">{userProfile.level}</p>
                                    </div>
                                    <div className="w-9 h-9 lg:w-10 lg:h-10 rounded-xl overflow-hidden border border-white/5 group-hover:border-indigo-500/50 transition-all">
                                        <img src={userProfile.avatar} className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        </header>

                        <main className="p-6 lg:p-10">
                            {view === 'recommendations' && (
                                <div className="space-y-6 lg:space-y-10 animate-in fade-in transition-all duration-500">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                                        <div>
                                            <h2 className="text-2xl lg:text-4xl font-extrabold tracking-tighter mb-1 lg:mb-2 leading-none">Intelligence</h2>
                                            <p className="text-slate-400 font-medium text-xs lg:text-base">Advanced AI recommendation engine and matrix computations.</p>
                                        </div>
                                        <div className="flex gap-1.5 lg:gap-2 flex-wrap">
                                            {DEMO_USERS.map(id => (
                                                <button key={id} onClick={() => generateRecommendations(id)} className={`px-3 lg:px-4 py-1.5 lg:py-2 rounded-lg lg:rounded-xl text-[8px] lg:text-[10px] font-bold uppercase transition-all border ${userId === id ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg' : 'bg-white/5 border-white/5 text-slate-500'}`}>ID: {id}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8 items-start">
                                        <div className="lg:col-span-8 space-y-6 lg:space-y-8">
                                            <div className="card p-6 lg:p-8 flex flex-col md:flex-row items-center justify-between gap-6 lg:gap-12 relative overflow-hidden">
                                                <div className="relative z-10 flex-1 w-full">
                                                    <span className="badge bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 block w-fit mb-3">ALG-V2.55</span>
                                                    <h3 className="text-xl lg:text-2xl font-black mb-4 leading-tight">Predicting the next big trend <br className="hidden sm:block"/>for user <span className="text-indigo-400">{userId}</span></h3>
                                                    <div className="flex gap-4 items-center">
                                                        <input type="text" value={userId} onChange={(e) => setUserId(e.target.value)} className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500/50 text-lg font-bold w-full sm:w-40" />
                                                        <button onClick={() => generateRecommendations()} disabled={loading} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 lg:px-8 py-3.5 rounded-xl font-bold transition-all shadow-xl shadow-indigo-600/30 whitespace-nowrap">{loading ? '...' : 'Analyze'}</button>
                                                    </div>
                                                </div>
                                                <div className="w-full md:w-1/3 aspect-video md:aspect-square rounded-2xl lg:rounded-[2rem] overflow-hidden relative border border-white/5">
                                                    <img src="/static/images/hero.png" className="w-full h-full object-cover opacity-80" />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 md:grid-cols-2 xl:grid-cols-3 gap-4 lg:gap-6">
                                                {recommendations.map((item, i) => (
                                                    <div key={i} className="card p-4 lg:p-5 group flex flex-col h-full">
                                                        <div className="w-full aspect-square rounded-xl lg:rounded-2xl bg-white/5 mb-3 lg:mb-4 overflow-hidden relative">
                                                            <ProductImage description={item.Description} stockCode={item.StockCode} />
                                                            <div className="absolute top-2 right-2 bg-indigo-600 text-white text-[7px] lg:text-[8px] font-black px-1.5 lg:px-2 py-0.5 lg:py-1 rounded uppercase tracking-widest shadow-lg">99%</div>
                                                        </div>
                                                        <div className="flex-1">
                                                            <div className="flex justify-between items-start mb-1 lg:mb-2">
                                                                <span className="text-[8px] lg:text-[9px] font-bold text-indigo-400 uppercase tracking-widest">{item.Category || 'Other'}</span>
                                                            </div>
                                                            <h4 className="font-bold text-[10px] lg:text-sm mb-3 lg:mb-4 line-clamp-2 uppercase tracking-tight">{item.Description}</h4>
                                                            <div className="flex justify-between items-center mt-auto">
                                                                <span className="font-black text-sm lg:text-lg">₹{item.Price || '499'}</span>
                                                                <button className="w-6 h-6 lg:w-8 lg:h-8 rounded lg:rounded-lg bg-white/5 hover:bg-indigo-600 transition-all flex items-center justify-center text-[10px] lg:text-base">🛒</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="lg:col-span-4 space-y-6 lg:space-y-8">
                                            <div className="card p-6 lg:p-8 border-indigo-500/20 bg-indigo-500/[0.03]">
                                                <h4 className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-4 lg:mb-6">System Health</h4>
                                                <div className="space-y-4 lg:space-y-6">
                                                    <div className="flex items-center justify-between text-xs">
                                                        <span className="font-medium text-slate-300">Accuracy</span>
                                                        <span className="font-bold">98.4%</span>
                                                    </div>
                                                    <div className="w-full h-1 bg-white/5 rounded-full"><div className="w-[98%] h-full bg-indigo-500 rounded-full"></div></div>
                                                    
                                                    <div className="flex items-center justify-between text-xs">
                                                        <span className="font-medium text-slate-300">Latency</span>
                                                        <span className="font-bold">42ms</span>
                                                    </div>
                                                    <div className="w-full h-1 bg-white/5 rounded-full"><div className="w-[15%] h-full bg-emerald-500 rounded-full"></div></div>
                                                </div>
                                            </div>
                                            <div className="card p-6 lg:p-8 bg-purple-500/[0.03] border-purple-500/20 hidden lg:block">
                                                <h4 className="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-4">Deep Insights</h4>
                                                <p className="text-sm text-slate-300 leading-normal">System detected a 14% increase in user interest for item categories matched this hour.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'explorer' && (
                                <div className="space-y-6 lg:space-y-8 animate-in slide-in-from-bottom duration-500">
                                    <div className="flex items-center justify-between p-2 pb-0 mb-4 overflow-x-auto gap-4">
                                        <select value={selectedCat} onChange={(e) => setSelectedCat(e.target.value)} className="bg-white/5 border border-white/10 text-xs lg:text-sm font-bold p-3 lg:p-4 rounded-xl outline-none cursor-pointer flex-grow sm:flex-grow-0">{categories.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-4 lg:gap-6">
                                        {filteredProducts.slice(0, 30).map((p, i) => (
                                            <div key={i} className="card p-3 lg:p-4 group cursor-pointer hover:bg-white/[0.03]">
                                                <div className="w-full aspect-square rounded-xl bg-white/5 mb-3 lg:mb-4 overflow-hidden">
                                                    <ProductImage description={p.Description} stockCode={p.StockCode} />
                                                </div>
                                                <h5 className="font-bold text-[10px] lg:text-[11px] mb-2 uppercase line-clamp-1 group-hover:text-indigo-400">{p.Description}</h5>
                                                <div className="flex justify-between items-center text-[10px] lg:text-xs">
                                                    <span className="font-black">₹{p.Price || '499'}</span>
                                                    <span className="text-[8px] font-bold text-slate-500">{p.StockCode}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'analytics' && (
                                <div className="flex items-center justify-center min-h-[50vh] animate-in zoom-in duration-500">
                                    <div className="card p-6 lg:p-12 w-full max-w-4xl flex flex-col lg:flex-row items-center gap-8 lg:gap-16">
                                        <div className="w-full lg:w-1/2 relative flex justify-center">
                                            <div className="w-full max-w-[280px] lg:max-w-full">
                                                <canvas ref={chartRef} className="max-h-[250px] lg:max-h-[350px]"></canvas>
                                            </div>
                                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                                                <p className="text-xl lg:text-4xl font-black">{allProducts.length}</p>
                                                <p className="text-[8px] lg:text-[10px] font-bold uppercase text-slate-500">Total SKUs</p>
                                            </div>
                                        </div>
                                        <div className="w-full lg:w-1/2 space-y-4 lg:space-y-8">
                                            <div className="text-center lg:text-left">
                                                <h3 className="text-xl lg:text-3xl font-black mb-1 lg:mb-2">Inventory Mix</h3>
                                                <p className="text-slate-400 font-medium text-xs lg:text-base">SKU distribution across top performing categories.</p>
                                            </div>
                                            <div className="grid grid-cols-2 lg:grid-cols-1 gap-3 lg:gap-4">
                                                {categories.slice(1, 5).map((c, i) => (
                                                    <div key={i} className="flex justify-between items-center p-3 lg:p-4 bg-white/5 rounded-xl lg:border border-white/5">
                                                        <span className="font-bold text-[10px] lg:text-sm">{c}</span>
                                                        <span className="text-indigo-400 font-black text-xs lg:text-base">{(30 - i*5)}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'profile' && (
                                <div className="max-w-6xl mx-auto animate-in fade-in transition-all duration-500">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-10">
                                        <div className="card p-8 lg:p-10 flex flex-col items-center text-center">
                                            <div className="w-32 h-32 lg:w-40 lg:h-40 rounded-3xl lg:rounded-[2.5rem] overflow-hidden border-4 border-indigo-600/20 mb-4 lg:mb-6 shadow-2xl shadow-indigo-500/10">
                                                <img src={userProfile.avatar} className="w-full h-full object-cover" />
                                            </div>
                                            <h2 className="text-xl lg:text-2xl font-black mb-1">{userProfile.name}</h2>
                                            <span className="px-2 lg:px-3 py-0.5 lg:py-1 bg-indigo-500 text-white text-[9px] lg:text-[10px] font-black uppercase rounded-lg mb-6 lg:mb-8">{userProfile.level}</span>
                                            
                                            <div className="w-full grid grid-cols-2 gap-3 lg:gap-4 text-left">
                                                <div className="p-4 lg:p-5 bg-white/5 rounded-2xl">
                                                    <p className="text-[9px] lg:text-[10px] font-bold text-slate-500 uppercase mb-1">Spent</p>
                                                    <p className="text-sm lg:text-lg font-black text-white">{userProfile.spent}</p>
                                                </div>
                                                <div className="p-4 lg:p-5 bg-white/5 rounded-2xl">

                                                <div className="card p-6 lg:p-8 bg-emerald-500/10 border-emerald-500/20">

                                                <div className="card p-6 lg:p-8 bg-amber-500/10 border-amber-500/20">

                                                    <p className="font-bold text-base lg:text-lg leading-tight uppercase tracking-tighter">15% Off Voucher</p>

                                    </div>

                        </main>
                    </div>

            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
